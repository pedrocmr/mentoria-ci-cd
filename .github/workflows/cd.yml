name: 🚀 CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  # Automatic deployment to dev environment on main branch push (trunk-based)
  deploy-dev:
    name: 🚀 Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: https://dev.mentoria-ci-cd.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🧪 Run tests (if not skipped)
        if: ${{ !inputs.skip_tests }}
        run: npm test
        
      - name: 🔨 Build application
        run: npm run build
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          NODE_ENV: dev
          
      - name: 🚀 Deploy to Development
        run: npm run deploy:dev
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOYED_AT: ${{ github.event.head_commit.timestamp }}
          GITHUB_ACTOR: ${{ github.actor }}
          
      - name: 📋 Deployment Summary
        run: |
          echo "## 🎉 Deployment to Development Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Development" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://dev.mentoria-ci-cd.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

  # Manual deployment to staging environment
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.mentoria-ci-cd.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🧪 Run tests (if not skipped)
        if: ${{ !inputs.skip_tests }}
        run: npm test
        
      - name: 🔨 Build application
        run: npm run build
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          NODE_ENV: staging
          
      - name: 🚀 Deploy to Staging
        run: npm run deploy:staging
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOYED_AT: ${{ github.event.head_commit.timestamp }}
          GITHUB_ACTOR: ${{ github.actor }}
          
      - name: 📋 Deployment Summary
        run: |
          echo "## 🎉 Deployment to Staging Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://staging.mentoria-ci-cd.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

  # Manual deployment to production environment (with extra safeguards)
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment:
      name: production
      url: https://mentoria-ci-cd.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: 🔒 Security audit (mandatory for production)
        run: npm audit --audit-level=moderate
        
      - name: 🧪 Run tests (mandatory for production)
        run: npm test
        
      - name: 🔨 Build application
        run: npm run build
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          NODE_ENV: production
          
      - name: ⏸️ Production deployment confirmation
        run: |
          echo "🚨 PRODUCTION DEPLOYMENT"
          echo "This will deploy to the production environment"
          echo "Build ID: ${{ github.run_id }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          
      - name: 🚀 Deploy to Production
        run: npm run deploy:production
        env:
          BUILD_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOYED_AT: ${{ github.event.head_commit.timestamp }}
          GITHUB_ACTOR: ${{ github.actor }}
          
      - name: 📋 Production Deployment Summary
        run: |
          echo "## 🎉 PRODUCTION DEPLOYMENT COMPLETED" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://mentoria-ci-cd.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY
          
      - name: 🔔 Production deployment notification
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "The application is now live at https://mentoria-ci-cd.com"